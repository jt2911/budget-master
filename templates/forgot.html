{% extends 'base.html' %}
{% block title %}Forgot Password - Budget Master{% endblock %}
{% block content %}
<div class="auth-page auth-page-centered">
    <div class="auth-card reveal">
        <div class="auth-header">
            <a href="{{ url_for('index') }}" class="auth-logo">
                <i class="fas fa-wallet"></i>
                <span>Budget Master</span>
            </a>
            <div class="auth-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>Forgot Password?</h1>
            <p>No worries! Enter your email and we'll send you reset instructions.</p>
        </div>
        
        <form class="auth-form" method="POST" action="{{ url_for('forgot') }}">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input type="email" id="email" name="email" required 
                       placeholder="Enter your registered email">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </form>
        
        <div class="auth-footer">
            <p><a href="{{ url_for('login') }}"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
